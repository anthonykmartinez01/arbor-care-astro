[build]
  command = "npm run build"
  publish = "dist"

# Cache static assets aggressively
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/tree-service-denver-co"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/services"
  to = "/tree-services"
  status = 301
  force = true

[[redirects]]
  from = "/about"
  to = "/about-arbor-care-index"
  status = 301
  force = true

[[redirects]]
  from = "/contact"
  to = "/contact-us"
  status = 301
  force = true

[[redirects]]
  from = "/tree-trimming-pruning-denver-co"
  to = "/tree-trimming"
  status = 301
  force = true

[[redirects]]
  from = "/tree-removal-denver-co"
  to = "/tree-removal"
  status = 301
  force = true

[[redirects]]
  from = "/firewood-supplier-denver-co"
  to = "/other-services"
  status = 301
  force = true
