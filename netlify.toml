[build]
  command = "npm run build"
  publish = "dist"

# Cache static assets aggressively
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers on every response (HSTS enforces HTTPS-only)
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Canonical host: 301 www -> non-www
[[redirects]]
  from = "https://www.arborcaretreesolutions.com/*"
  to = "https://arborcaretreesolutions.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/tree-service-denver-co"
  to = "/"
  status = 301
  force = true

[[redirects]]
